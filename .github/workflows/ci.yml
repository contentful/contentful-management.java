name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test (Java 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in dev container
        uses: devcontainers/ci@v0.3
        env:
          JAVA_VERSION: "8"
        with:
          push: never
          runCmd: ./mvnw -B test
